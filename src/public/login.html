<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Portal de Productos</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="animated-bg"></div>

  <!-- Header -->
  <header>
    <nav>
      <div class="logo">Portal Productos</div>
      <div class="nav-links">
        <a href="/">Productos</a>
        <a href="/register.html">Registrarse</a>
      </div>
    </nav>
  </header>

  <!-- Formulario de Login -->
  <div class="form-container">
    <h2>Iniciar Sesión</h2>
    
    <div id="alertContainer"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        <span id="btnText">Iniciar Sesión</span>
        <span id="btnLoading" style="display: none;">
          <span class="loading"></span> Iniciando sesión...
        </span>
      </button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: var(--color-text-muted);">
      ¿No tienes cuenta? 
      <a href="/register.html" style="color: var(--color-primary);">Regístrate aquí</a>
    </p>

    <div style="margin-top: 2rem; padding: 1rem; background: rgba(0, 255, 136, 0.1); border-radius: 10px; border: 1px solid var(--color-primary);">
      <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Usuarios de prueba:</strong></p>
      <p style="font-size: 0.85rem; color: var(--color-text-muted); margin: 0.25rem 0;">
        <strong>Admin:</strong> admin@test.com / admin123
      </p>
      <p style="font-size: 0.85rem; color: var(--color-text-muted); margin: 0.25rem 0;">
        <strong>Usuario:</strong> user@test.com / user123
      </p>
    </div>
  </div>

  <script>
    // Verificar si ya está autenticado
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = '/';
    }

    // Manejar envío del formulario
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btnText = document.getElementById('btnText');
      const btnLoading = document.getElementById('btnLoading');
      const alertContainer = document.getElementById('alertContainer');
      
      btnText.style.display = 'none';
      btnLoading.style.display = 'inline';
      alertContainer.innerHTML = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // Guardar token y usuario en localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          alertContainer.innerHTML = `
            <div class="alert alert-success">
              ¡Inicio de sesión exitoso! Redirigiendo...
            </div>
          `;
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          alertContainer.innerHTML = `
            <div class="alert alert-error">
              ${data.message || 'Error al iniciar sesión'}
            </div>
          `;
          btnText.style.display = 'inline';
          btnLoading.style.display = 'none';
        }
      } catch (error) {
        console.error('Error:', error);
        alertContainer.innerHTML = `
          <div class="alert alert-error">
            Error de conexión. Por favor, intenta de nuevo.
          </div>
        `;
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
