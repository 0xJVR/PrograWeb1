<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat en Tiempo Real - Portal de Productos</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/chat.css" />
</head>
<body>
  <div class="animated-bg"></div>

  <!-- Header -->
  <header>
    <nav>
      <div class="logo">Portal Productos</div>
      <div class="nav-links" id="navLinks">
        <a href="/">Productos</a>
        <a href="/chat.html" aria-current="page">Chat</a>
        <div class="user-info" id="userInfo" style="display: none;">
          <div class="user-avatar" id="userAvatar" aria-hidden="true"></div>
          <div>
            <div id="userName"></div>
            <span class="role-badge" id="userRole"></span>
          </div>
          <button class="btn btn-secondary" id="logoutBtn" type="button">Cerrar Sesión</button>
        </div>
      </div>
    </nav>
  </header>

  <!-- Contenedor de Chat -->
  <div class="container">
    <div class="chat-container">
      <!-- Sidebar de conversaciones (solo para admin) -->
      <aside class="chat-sidebar" id="chatSidebar" style="display: none;">
        <div class="sidebar-header">
          <h3>Conversaciones</h3>
          <button class="btn btn-primary" id="newConversationBtn" style="display: none;" type="button">+ Nueva</button>
        </div>
        <div class="conversations-list" id="conversationsList" role="list">
          <!-- Las conversaciones se cargarán aquí -->
        </div>
      </aside>

      <!-- Área principal de chat -->
      <main class="chat-main" id="chatMain">
        <div class="chat-header" id="chatHeader">
          <div class="chat-status" id="chatStatus" aria-label="Estado de conexión" role="status"></div>
          <div>
            <h3 style="margin: 0; font-size: 1.2rem;" id="chatTitle">Selecciona una conversación</h3>
            <p style="margin: 0; font-size: 0.85rem; color: var(--color-text-muted);" id="onlineUsers">
              Conectando...
            </p>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages" style="display: none;" role="log" aria-live="polite" aria-relevant="additions">
          <!-- Los mensajes se cargarán aquí -->
        </div>

        <div id="noConversationSelected" style="text-align: center; padding: 2rem; color: var(--color-text-muted);">
          <p>Selecciona una conversación para comenzar a chatear</p>
        </div>

        <div id="typingIndicator" class="typing-indicator" style="display: none; margin: 0 1.5rem 1rem;" aria-live="polite">
          <span id="typingUser"></span> está escribiendo...
        </div>

        <div class="chat-input-container" id="chatInputContainer" style="display: none;">
          <input
            type="text"
            class="chat-input"
            id="messageInput"
            placeholder="Escribe un mensaje..."
            maxlength="1000"
            autocomplete="off"
            aria-label="Escribe un mensaje"
          />
          <button class="btn btn-primary" id="sendBtn" type="button">
            Enviar
          </button>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal para nueva conversación -->
  <div class="modal" id="newConversationModal" role="dialog" aria-modal="true" aria-labelledby="newConversationTitle" tabindex="-1">
    <div class="modal-content" role="document">
      <div class="modal-header">
        <h3 id="newConversationTitle">Nueva Conversación</h3>
        <button class="close-modal" id="closeNewConversationModal" aria-label="Cerrar" type="button">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="recipientSelect">Seleccionar usuario:</label>
          <select id="recipientSelect" class="form-control" required>
            <option value="">-- Selecciona un usuario --</option>
            <!-- Opciones se cargarán dinámicamente -->
          </select>
        </div>
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button type="button" class="btn btn-primary" id="startConversationBtn" style="flex: 1;">Iniciar Chat</button>
        <button type="button" class="btn btn-secondary" id="cancelNewConversationBtn" style="flex: 1;">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Socket.IO Client -->
  <script src="/socket.io/socket.io.js"></script>

  <script src="/chat.js"></script>
</body>
</html>
